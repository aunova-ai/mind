<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마인드웨더 (Mind Weather) | 내 마음의 기상청</title>
    <link rel="icon" href="assets/favicon.ico">
    <style>
        :root {
            --primary-color: #FFB347; /* Warm Orange */
            --secondary-color: #64B5F6; /* Sky Blue */
            --accent-color: #FFF9C4; /* Soft Yellow */
            --text-main: #333333;
            --text-sub: #666666;
            --bg-color: #FFFFFF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #FFFDF5;
            color: var(--text-main);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; overflow-x: hidden;
        }
        #app-container {
            width: 100%; max-width: 480px;
            background: white; min-height: 100vh;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .header-logo {
            padding: 20px; display: flex; align-items: center; gap: 8px;
            position: sticky; top: 0; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px); z-index: 50;
        }
        .top-logo-img { height: 28px; }
        .top-logo-text { font-weight: 800; font-size: 16px; color: var(--primary-color); }
        
        section { display: none; padding: 20px; flex: 1; }
        section.active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Start Screen */
        .content-box { text-align: center; }
        .intro-image-wrapper { 
            width: calc(100% + 40px); margin: -20px -20px 30px -20px;
            height: 480px; background: #FFF9C4; overflow: hidden;
        }
        .intro-img { width: 100%; height: 100%; object-fit: cover; }
        .brand-title { font-size: 14px; font-weight: 600; color: var(--primary-color); text-transform: uppercase; letter-spacing: 2px; }
        .test-title { font-size: 32px; font-weight: 800; margin: 10px 0 20px; line-height: 1.2; }
        .test-desc { font-size: 16px; color: var(--text-sub); line-height: 1.6; margin-bottom: 40px; }
        .primary-btn {
            background: var(--primary-color); color: white;
            border: none; padding: 18px 40px; border-radius: 50px;
            font-size: 18px; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 179, 71, 0.3);
            transition: all 0.2s ease;
        }
        .primary-btn:active { transform: scale(0.96); }

        /* Question Screen */
        .progress-bar {
            width: 100%; height: 6px; background: #EEEEEE;
            border-radius: 10px; margin-bottom: 30px;
        }
        .progress-fill {
            height: 100%; background: var(--primary-color);
            width: 10%; border-radius: 10px; transition: width 0.3s ease;
        }
        #question-number { font-size: 14px; font-weight: 700; color: var(--primary-color); }
        #question-text { font-size: 22px; font-weight: 700; margin: 15px 0 30px; line-height: 1.4; height: 3.2em; display: flex; align-items: flex-start; }
        .option-btn {
            width: 100%; padding: 16px 20px; margin-bottom: 12px;
            background: #F8F9FA; border: 2px solid #F1F3F5;
            border-radius: 15px; text-align: left; font-size: 16px;
            color: var(--text-main); font-weight: 500; cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover { background: var(--accent-color); border-color: var(--primary-color); }
        .option-btn:active { background: var(--accent-color); transform: scale(0.98); }

        /* Subjective Box */
        .subjective-box { display: none; }
        .subjective-box.active { display: block; }
        .subjective-input {
            width: 100%; height: 120px; padding: 15px; border-radius: 15px;
            border: 2px solid var(--accent-color); font-size: 16px; margin-top: 15px;
            resize: none; outline: none; transition: border-color 0.3s;
        }
        .subjective-input:focus { border-color: var(--primary-color); }

        /* Result Screen */
        .result-box { text-align: center; }
        .result-label { font-size: 14px; color: var(--text-sub); font-weight: 600; }
        #result-type { font-size: 48px; font-weight: 900; margin: 5px 0 15px; }
        
        .result-image-wrapper {
            width: calc(100% + 40px); margin: -20px -20px 20px -20px;
            height: 320px; background: #fdf6e3; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            border-bottom: 3px solid rgba(255, 179, 71, 0.1);
        }
        #result-img { 
            max-width: 100%; max-height: 100%; width: auto; height: auto;
            transform: scale(1.1); object-fit: contain; 
        }
        #result-diagnosis {
            font-size: 15px; color: var(--text-sub);
            line-height: 1.6; margin-bottom: 20px;
        }
        #care-video-section { margin: 15px 0; text-align: left; }
        #care-title {
            font-size: 14px; font-weight: 700; color: var(--primary-color);
            margin-bottom: 10px; display: block;
        }
        .video-card {
            background: var(--accent-color); padding: 18px; border-radius: 20px;
            display: flex; align-items: center; gap: 15px; cursor: pointer;
        }
        .video-play-btn {
            width: 40px; height: 40px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: var(--primary-color); font-weight: 700; flex-shrink: 0;
        }
        #care-video-text { font-size: 15px; font-weight: 500; }
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .share-btn, .community-btn {
            flex: 1; padding: 12px; border-radius: 50px; border: none; font-weight: 700; cursor: pointer;
        }
        .share-btn { background: #f5f5f5; color: var(--text-main); }
        .community-btn { background: var(--primary-color); color: white; }

        /* Navigation */
        #bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 440px; background: white;
            height: 65px; border-radius: 35px; display: flex;
            justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: var(--text-sub); cursor: pointer; }
        .nav-item.active { color: var(--primary-color); }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; opacity: 0.6; }
        .nav-item.active .nav-icon { opacity: 1; }

        /* Loading */
        .loading-content { text-align: center; padding-top: 40%; }
        .cloud-loader { width: 80px; height: 50px; margin: 0 auto 30px auto; background: var(--primary-color); border-radius: 50px; position: relative; animation: pulse 1.5s infinite; }
        .cloud-loader::before { content: ''; position: absolute; width: 40px; height: 40px; background: var(--primary-color); border-radius: 50%; top: -20px; left: 15px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        /* Video Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { width: 90%; max-width: 500px; background: white; border-radius: 20px; padding: 15px; position: relative; }
        .close-btn { position: absolute; top: -40px; right: 0; background: none; border: none; color: white; font-size: 30px; cursor: pointer; }
        .iframe-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        @media (min-width: 1024px) {
            #app-container { max-width: 1000px; height: 90vh; padding-bottom: 20px; margin-top: 5vh; border-radius: 20px; box-shadow: 0 50px 100px rgba(0,0,0,0.1); }
            #bottom-nav { position: relative; max-width: 500px; margin: 20px auto 0; bottom: 0; left: 0; transform: none; }
            .content-box, .question-box, .result-box { flex: 1; display: flex; flex-direction: column; justify-content: center; }
            .intro-image-wrapper { width: calc(100% + 100px); margin: -30px -50px 20px; height: 350px; }
            .test-title { font-size: 42px; }
            .result-image-wrapper { width: calc(100% + 100px); margin: -30px -50px 20px; height: 320px; }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <header class="header-logo">
            <img src="assets/logo.png" alt="Logo" class="top-logo-img">
            <span class="top-logo-text">Mind Weather</span>
        </header>

        <section id="start-screen" class="active">
            <div class="content-box">
                <div class="intro-image-wrapper"><img src="assets/intro.png" class="intro-img"></div>
                <span class="brand-title">Aunova Mind Weather</span>
                <h1 class="test-title">오늘 마음 날씨는 어떤가요?</h1>
                <button id="start-btn" class="primary-btn">진단 시작하기</button>
            </div>
        </section>

        <section id="question-screen">
            <div class="question-box">
                <div class="progress-bar"><div class="progress-fill" id="progress-bar-fill"></div></div>
                <div id="mc-area">
                    <span id="question-number">Question 01</span>
                    <h2 id="question-text">불러오는 중...</h2>
                    <div id="options-container"></div>
                </div>
                <div id="subjective-area" class="subjective-box">
                    <span>마지막 질문</span>
                    <h2>오늘 당신의 기분을 날씨로 한 단어로 표현한다면? 그 이유는 무엇인가요?</h2>
                    <textarea class="subjective-input" id="subjective-input" placeholder="예: 소나기, 아침에 갑자기 당황스러웠어요."></textarea>
                    <button id="submit-btn" class="primary-btn" style="margin-top: 20px; width: 100%;">분석 결과 보기</button>
                </div>
            </div>
        </section>

        <section id="loading-screen">
            <div class="loading-content">
                <div class="cloud-loader"></div>
                <p>마음 기상청에서 정밀 분석 중입니다...</p>
            </div>
        </section>

        <section id="result-screen">
            <div class="result-box">
                <span class="result-label">오늘 내 마음의 날씨는</span>
                <h1 id="result-type">맑음</h1>
                <div class="result-image-wrapper"><img id="result-img" src=""></div>
                <p id="result-diagnosis"></p>
                <div id="care-video-section">
                    <span id="care-title">추천 처방 영상</span>
                    <div class="video-card" id="care-video-btn">
                        <div class="video-play-btn">▶</div>
                        <span id="care-video-text">영상 보기</span>
                    </div>
                </div>
                <div class="action-btns">
                    <button class="share-btn" id="share-btn">공유하기</button>
                    <button class="community-btn" id="community-btn">커뮤니티 입장</button>
                </div>
            </div>
        </section>

        <nav id="bottom-nav">
            <div class="nav-item active" onclick="setNavActive(this)">🏠<span>Home</span></div>
            <div class="nav-item" onclick="setNavActive(this)">🎁<span>Present</span></div>
            <div class="nav-item" onclick="setNavActive(this)">📺<span>Video</span></div>
            <div class="nav-item" onclick="setNavActive(this)">🎧<span>Care</span></div>
        </nav>
    </div>

    <div id="video-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-modal-btn" class="close-btn">&times;</button>
            <div class="iframe-container"><iframe id="video-iframe" src="" frameborder="0" allowfullscreen></iframe></div>
        </div>
    </div>

    <script>
    const questionPool = [
        { id: 1, text: "오늘 아침 눈을 떴을 때, 마음 하늘은 어떤 풍경이었나요?", options: [{text: "맑은 아침 햇살 ☀️", score: 0}, {text: "약간 흐린 하늘", score: 3}, {text: "뿌연 잿빛 구름 ☁️", score: 5}, {text: "비가 올 듯한 무거운 하늘", score: 8}, {text: "길을 잃은 자욱한 안개 🌫️", score: 10}] },
        { id: 2, text: "업무나 일상 업무를 시작할 때, 현재 마음의 기압은?", options: [{text: "가벼운 고기압 💪", score: 0}, {text: "평범한 기압", score: 3}, {text: "다소 무거운 공기", score: 5}, {text: "축축한 저기압 🌧️", score: 8}, {text: "숨이 턱 막히는 고전압 ⛈️", score: 10}] },
        { id: 3, text: "작은 실수를 했을 때, 마음의 바람 세기는 어떤가요?", options: [{text: "가벼운 소풍 같은 미풍 🍃", score: 0}, {text: "조금 신경 쓰이는 바람", score: 3}, {text: "먼지가 날리는 강한 바람", score: 6}, {text: "모든 것을 뒤흔드는 광풍", score: 8}, {text: "내 안을 휩쓰는 거대한 태풍 🌪️", score: 10}] },
        { id: 4, text: "주변의 기쁜 소식에 내 마음의 온도 변화는?", options: [{text: "따뜻하고 온화함 🔥", score: 0}, {text: "적당한 온기", score: 3}, {text: "미지근한 느낌", score: 6}, {text: "조금 서늘한 기분", score: 8}, {text: "차가운 겨울 바람 ❄️", score: 10}] },
        { id: 5, text: "휴식 시간을 가질 때, 나는 어떤 구름 위에 있나요?", options: [{text: "폭신폭신한 뭉게구름 🌈", score: 0}, {text: "잠깐 쉬어가는 얇은 구름", score: 3}, {text: "그냥 멈춰있는 고요한 구름", score: 6}, {text: "금방이라도 비를 뿌릴 먹구름", score: 8}, {text: "눈앞을 가리는 캄캄한 어둠 🌑", score: 10}] },
        { id: 6, text: "예정에 없던 돌발 상황이 생기면 내 마음의 번개는?", options: [{text: "깜빡이는 작은 불꽃 ⚡", score: 0}, {text: "한두 번 으르렁거리는 천둥", score: 4}, {text: "당황함에 번쩍이는 섬광", score: 7}, {text: "온몸이 굳는 강한 낙뢰", score: 9}, {text: "세상이 부서질 듯한 대폭발 🎇", score: 10}] },
        { id: 7, text: "다른 사람과의 대화 후, 내 마음의 습도는 어떤가요?", options: [{text: "보송보송하고 쾌적함 ✨", score: 0}, {text: "살짝 땀이 밴 정도", score: 3}, {text: "끈적끈적한 불쾌지수", score: 6}, {text: "물에 젖은 듯 축 처진 상태", score: 8}, {text: "곰팡이가 필 듯 습한 지하실", score: 10}] },
        { id: 8, text: "거울 속 내 표정에서 느껴지는 일조량은?", options: [{text: "눈부신 한여름 태양 🌞", score: 0}, {text: "화사한 봄날의 햇살", score: 3}, {text: "그늘진 저녁 노을", score: 6}, {text: "구름 뒤에 숨은 흐릿한 빛", score: 8}, {text: "빛 한 점 없는 한밤중 🌌", score: 10}] },
        { id: 9, text: "잠들기 전, 오늘 하루라는 날씨를 기억하는 습관은?", options: [{text: "내일을 기대하며 단잠 🌟", score: 0}, {text: "무난하게 넘기기", score: 3}, {text: "조금 아쉬운 밤", score: 6}, {text: "후회와 걱정의 빗줄기", score: 9}, {text: "악몽 같은 추위에 떨며 기상", score: 10}] },
        { id: 10, text: "나에게 에너지를 주는 원동력을 날씨로 비유한다면?", options: [{text: "만물을 채우는 햇빛 🌱", score: 0}, {text: "시원하게 씻어주는 비", score: 4}, {text: "세상을 뒤덮는 고요한 눈", score: 7}, {text: "잠시 스치는 계절의 향기", score: 9}, {text: "아무것도 없는 무색무취 🌫️", score: 10}] }
    ];

    const resultMapping = [
        { type: "맑음", score_range: [0, 15], color: "#FFB347", care_title: "행복 확장 명상", care_video_url: "https://www.youtube.com/watch?v=5V2E_7y8iOk", animals: [{name: "쿼카", diagnosis: "당신의 마음은 세상에서 가장 행복한 쿼카처럼 맑습니다!", image: "./assets/clear.png"}, {name: "강아지", diagnosis: "신나게 뛰노는 해맑은 강아지 같은 상태예요!", image: "./assets/clear.png"}] },
        { type: "흐림", score_range: [16, 45], color: "#FFE0B2", care_title: "마음 정화 쇼츠", care_video_url: "https://www.youtube.com/shorts/50uXgR9pGz4", animals: [{name: "코알라", diagnosis: "느긋한 코알라처럼 잠시 쉬어가야 할 흐린 날씨입니다.", image: "./assets/cloudy.png"}, {name: "판다", diagnosis: "편안하게 대나무 숲을 즐기는 판다처럼 에너지를 아끼세요.", image: "./assets/cloudy.png"}] },
        { type: "안개", score_range: [46, 75], color: "#E0F2F1", care_title: "시야 확보 명상", care_video_url: "https://www.youtube.com/watch?v=3R4M7wT8P24", animals: [{name: "토끼", diagnosis: "안개 속 토끼처럼 조심스러운 상태네요. 천천히 나아가세요.", image: "./assets/foggy.png"}, {name: "사슴", diagnosis: "자욱한 안개 속 사슴처럼 조심스럽게 길을 살피고 있군요.", image: "./assets/foggy.png"}] },
        { type: "폭풍", score_range: [76, 1000], color: "#FF8A65", care_title: "긴급 폭풍 처방", care_video_url: "https://www.youtube.com/watch?v=MIr3rsfCk_Y", animals: [{name: "사자", diagnosis: "강한 폭풍우에 노출되었습니다. 사자처럼 용맹하게 견뎌내세요.", image: "./assets/stormy.png"}, {name: "늑대", diagnosis: "모든 짐을 짊어진 고독한 늑대 같군요. 도움이 필요합니다.", image: "./assets/stormy.png"}] }
    ];

    let currentQuestion = 0, totalScore = 0, activeQuestions = [], currentCareUrl = "";
    const progressBar = document.getElementById('progress-bar-fill');

    function initQuestions() {
        activeQuestions = [...questionPool].sort(() => 0.5 - Math.random());
        currentQuestion = 0; totalScore = 0;
        document.getElementById('mc-area').style.display = 'block';
        document.getElementById('subjective-area').classList.remove('active');
        displayQuestion();
    }

    function displayQuestion() {
        if (currentQuestion >= activeQuestions.length) {
            document.getElementById('mc-area').style.display = 'none';
            document.getElementById('subjective-area').classList.add('active');
            progressBar.style.width = '100%';
            return;
        }
        const q = activeQuestions[currentQuestion];
        document.getElementById('question-number').innerText = `Question ${String(currentQuestion + 1).padStart(2, '0')}`;
        document.getElementById('question-text').innerText = q.text;
        progressBar.style.width = `${((currentQuestion + 1) / (activeQuestions.length + 1)) * 100}%`;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn'; btn.innerText = opt.text;
            btn.onclick = () => { totalScore += opt.score; currentQuestion++; displayQuestion(); };
            container.appendChild(btn);
        });
    }

    document.getElementById('start-btn').onclick = () => { initQuestions(); document.getElementById('start-screen').classList.remove('active'); document.getElementById('question-screen').classList.add('active'); };
    document.getElementById('submit-btn').onclick = () => { 
        document.getElementById('question-screen').classList.remove('active');
        document.getElementById('loading-screen').classList.add('active');
        setTimeout(() => {
            document.getElementById('loading-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            const result = resultMapping.find(r => totalScore >= r.score_range[0] && totalScore <= r.score_range[1]) || resultMapping[3];
            const animal = result.animals[Math.floor(Math.random() * result.animals.length)];
            document.getElementById('result-type').innerText = result.type;
            document.getElementById('result-type').style.color = result.color;
            document.getElementById('result-diagnosis').innerText = animal.diagnosis;
            document.getElementById('result-img').src = animal.image;
            document.getElementById('care-video-text').innerText = `${result.type} 처방 영상 보기`;
            currentCareUrl = result.care_video_url;
        }, 2000);
    };

    document.getElementById('care-video-btn').onclick = () => {
        const modal = document.getElementById('video-modal');
        const iframe = document.getElementById('video-iframe');
        iframe.src = currentCareUrl.replace('watch?v=', 'embed/').replace('shorts/', 'embed/');
        modal.classList.add('active');
    };
    document.getElementById('close-modal-btn').onclick = () => { document.getElementById('video-modal').classList.remove('active'); document.getElementById('video-iframe').src = ""; };
    
    window.setNavActive = (el) => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(el.innerText.includes("Home")) location.reload();
    };
