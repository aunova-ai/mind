<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마인드웨더 (Mind Weather) | 내 마음의 기상청</title>
    <link rel="icon" href="assets/favicon.ico">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header class="header-logo">
            <img src="assets/logo.png" alt="Logo" class="top-logo-img">
            <span class="top-logo-text">Mind Weather</span>
        </header>

        <section id="start-screen" class="active">
            <div class="content-box">
                <div class="intro-image-wrapper"><img src="assets/intro.png" class="intro-img"></div>
                <span class="brand-title">Aunova Mind Weather</span>
                <h1 class="test-title">오늘 마음 날씨는 어떤가요?</h1>
                <p class="test-desc">내면의 기상도를 체크하고<br>맞춤형 마음 처방전과 영상을 받아보세요.</p>
                <button id="start-btn" class="primary-btn">진단 시작하기</button>
            </div>
        </section>

        <section id="question-screen">
            <div class="question-box">
                <div class="progress-bar-container"><div id="progress-bar-fill"></div></div>
                <div id="mc-area">
                    <span id="question-number">Question 01</span>
                    <h2 id="question-text">불러오는 중...</h2>
                    <div id="options-container"></div>
                </div>
                <div id="subjective-area" class="subjective-box" style="display:none;">
                    <span>마지막 질문</span>
                    <h2>오늘 당신의 기분을 날씨로 한 단어로 표현한다면? 그 이유는 무엇인가요?</h2>
                    <textarea class="subjective-input" id="subjective-input" placeholder="예: 소나기, 아침에 갑자기 당황스러웠어요."></textarea>
                    <button id="submit-btn" class="primary-btn" style="margin-top: 20px; width: 100%;">분석 결과 보기</button>
                </div>
            </div>
        </section>

        <section id="loading-screen">
            <div class="loading-content">
                <div class="cloud-loader"></div>
                <p>마음 기상청에서 정밀 분석 중입니다...</p>
            </div>
        </section>

        <section id="result-screen">
            <div class="result-box">
                <span class="result-label">오늘 내 마음의 날씨는</span>
                <h1 id="result-type">분석 중</h1>
                <div class="result-image-wrapper"><img id="result-img" src=""></div>
                <p id="result-diagnosis"></p>
                <div id="care-video-section">
                    <span id="care-title">추천 처방 영상</span>
                    <div class="video-card" id="care-video-btn">
                        <div class="video-play-btn">▶</div>
                        <span id="care-video-text">영상 보기</span>
                    </div>
                </div>
                <div class="action-btns">
                    <button class="share-btn" id="share-btn">공유하기</button>
                    <button class="community-btn" id="community-btn">커뮤니티 입장</button>
                </div>
            </div>
        </section>

        <nav id="bottom-nav">
            <div class="nav-item active" onclick="setNavActive(this)">🏠<span>Home</span></div>
            <div class="nav-item" onclick="setNavActive(this)">🎁<span>Present</span></div>
            <div class="nav-item" onclick="setNavActive(this)">📺<span>Video</span></div>
            <div class="nav-item" onclick="setNavActive(this)">🎧<span>Care</span></div>
        </nav>
    </div>

    <div id="video-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-modal-btn" class="close-btn">&times;</button>
            <div class="iframe-container"><iframe id="video-iframe" src="" frameborder="0" allowfullscreen></iframe></div>
        </div>
    </div>

    <script src="engine.js" defer></script>
</body>
</html>
