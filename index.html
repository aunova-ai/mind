<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마인드웨더(Mind Weather) | 내 마음의 기상 특보</title>
    <meta name="description" content="오늘 당신의 마음 날씨는 어떤가요? 10개 질문으로 알아보는 정밀 심리 기상도.">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Start Screen -->
        <section id="start-screen" class="active">
            <div class="content-box">
                <div class="intro-image-wrapper">
                    <img src="assets/intro.png" alt="내 마음의 기상청" class="intro-img">
                </div>
                <h1 class="brand-title">Aunova Mind</h1>
                <h2 class="test-title">번아웃 기상 특보</h2>
                <p class="test-desc">오늘 당신의 마음 하늘에는 어떤 구름이 떠 있나요?<br>10초면 확인하는 나만의 정밀 심리 기상도</p>
                <button id="start-btn" class="primary-btn">진단 시작하기</button>
            </div>
        </section>

        <!-- Question Screen -->
        <section id="question-screen">
            <div class="progress-bar-container">
                <div id="progress-bar-fill"></div>
            </div>
            <div class="question-box">
                <span id="question-number">Question 01</span>
                <h2 id="question-text">질문을 불러오는 중입니다...</h2>
                <div id="options-container">
                    <!-- Options will be generated here -->
                </div>
            </div>
        </section>

        <!-- Loading Screen -->
        <section id="loading-screen">
            <div class="loading-content">
                <div class="cloud-loader"></div>
                <p>마음 기상청에서 정밀 분석 중입니다...</p>
            </div>
        </section>

        <!-- Result Screen -->
        <section id="result-screen">
            <div class="result-box">
                <span class="result-label">오늘 내 마음의 날씨는</span>
                <h1 id="result-type">맑음</h1>
                <div class="result-image-wrapper">
                    <img id="result-img" src="" alt="결과 이미지">
                </div>
                <div id="care-video-section">
                    <span id="care-title">추천 처방 영상</span>
                    <div class="video-card" id="care-video-btn">
                        <div class="video-play-btn">▶</div>
                        <p id="care-video-text">명상 영상 보러가기</p>
                    </div>
                </div>
                <div class="action-btns">
                    <button class="share-btn">공유하기</button>
                    <button class="community-btn" onclick="window.open('https://open.kakao.com/')">커뮤니티 입장</button>
                </div>
        <!-- Bottom Navigation -->
        <nav id="bottom-nav">
            <div class="nav-item">
                <img src="https://cdn0.iconfinder.com/data/icons/google-material-design-3-0/48/ic_home_48px-512.png" class="nav-icon" alt="home">
                <span>Home</span>
            </div>
            <div class="nav-item active">
                <img src="https://cdn4.iconfinder.com/data/icons/basic-ui-2-line/32/assessment-check-test-form-512.png" class="nav-icon" alt="assess">
                <span>Assess</span>
            </div>
            <div class="nav-item">
                <img src="https://cdn4.iconfinder.com/data/icons/picons-thin/57/thin-0049_book_reading_library-512.png" class="nav-icon" alt="library">
                <span>Library</span>
            </div>
            <div class="nav-item">
                <img src="https://cdn4.iconfinder.com/data/icons/basic-ui-2-line/32/heart-like-favorite-love-512.png" class="nav-icon" alt="care">
                <span>Care</span>
            </div>
        </nav>
    </div>

    <script src="main.js"></script>
</body>
</html>
