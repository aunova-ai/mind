<head>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FCFBF7 0%, #FFF9C4 100%);
            --primary-color: #FFB347;
            --secondary-color: #E0F2F1;
            --accent-color: #FFE0B2;
            --text-main: #4A4A4A;
            --text-sub: #7D7D7D;
            --box-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 179, 71, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; /* Center again for one-screen view */
            overflow-x: hidden;
            overflow-y: auto;
            color: var(--text-main);
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none; /* Firefox */
        }
        body::-webkit-scrollbar { display: none; } /* Chrome, Safari and Opera */
        #app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 20px 20px 120px 20px; /* Increased bottom padding for nav */
            box-sizing: border-box;
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            z-index: 10;
        }
        .top-logo-img { height: 36px; width: auto; object-fit: contain; }
        .top-logo-text { font-size: 18px; font-weight: 700; color: var(--primary-color); letter-spacing: -0.5px; }
        
        section {
            display: none;
            flex-direction: column;
            align-items: center;
            flex: 1;
            animation: fadeIn 0.5s ease;
        }
        section.active { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .content-box, .question-box, .result-box {
            background: var(--box-bg);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px 30px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 15px 40px rgba(255, 179, 71, 0.1);
            text-align: center;
        }
        .intro-image-wrapper {
            width: calc(100% + 60px); height: 280px;
            margin: -40px -30px 30px -30px;
            border-radius: 32px 32px 0 0;
            overflow: hidden;
        }
        .intro-img { width: 100%; height: 100%; object-fit: cover; }
        .brand-title {
            font-size: 14px; color: var(--primary-color);
            letter-spacing: 2px; margin-bottom: 5px;
        }
        .test-title { font-size: 32px; margin-bottom: 15px; font-weight: 700; }
        .test-desc {
            font-size: 16px; color: var(--text-sub);
            line-height: 1.6; margin-bottom: 40px;
        }
        .primary-btn {
            background: linear-gradient(to right, var(--primary-color), #FFCC80);
            color: white; border: none;
            padding: 15px 40px; border-radius: 50px;
            font-size: 18px; font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .primary-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 179, 71, 0.4);
        }
        .progress-bar-container {
            width: 100%; height: 8px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px; margin-bottom: 30px; overflow: hidden;
        }
        #progress-bar-fill {
            width: 10%; height: 100%;
            background: var(--primary-color);
            transition: width 0.3s ease;
        }
        #question-number {
            font-size: 14px; color: var(--primary-color);
            font-weight: 700; margin-bottom: 10px; display: block;
        }
        #question-text { font-size: 22px; margin-bottom: 30px; line-height: 1.4; }
        .option-btn {
            width: 100%; background: white;
            border: 1px solid #ddd; padding: 15px 20px;
            border-radius: 15px; margin-bottom: 12px;
            font-size: 16px; cursor: pointer;
            transition: all 0.2s ease; text-align: left;
        }
        .option-btn:hover {
            border-color: var(--primary-color);
            background: #FFF8E1;
        }
        .result-label { font-size: 16px; color: var(--text-sub); }
        #result-type {
            font-size: 40px; margin: 10px 0 15px 0;
            color: var(--primary-color);
        }
        #result-diagnosis {
            font-size: 15px; color: var(--text-sub);
            line-height: 1.6; margin-bottom: 20px;
        }
        .result-image-wrapper {
            width: 100%; height: 220px;
            background: white; border-radius: 20px;
            margin-bottom: 20px; overflow: hidden;
        }
        #result-img { width: 100%; height: 100%; object-fit: cover; }
        #care-video-section { margin: 15px 0; text-align: left; }
        #care-title {
            font-size: 14px; font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 10px; display: block;
        }
        .video-card {
            background: var(--accent-color); padding: 18px;
            border-radius: 20px; display: flex;
            align-items: center; gap: 15px;
            cursor: pointer; transition: transform 0.2s ease;
        }
        .video-card:hover { transform: scale(1.02); }
        .video-play-btn {
            width: 40px; height: 40px;
            background: white; border-radius: 50%;
            display: flex; justify-content: center;
            align-items: center; color: var(--primary-color);
            font-weight: 700; flex-shrink: 0;
        }
        #care-video-text { font-size: 15px; font-weight: 500; }
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .share-btn, .community-btn {
            flex: 1; padding: 12px; border-radius: 50px;
            border: none; font-weight: 700; cursor: pointer;
            font-size: 14px;
        }
        .share-btn { background: #f5f5f5; color: var(--text-main); }
        .community-btn { background: var(--primary-color); color: white; }
        #bottom-nav {
            position: fixed; bottom: 20px;
            left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 440px;
            background: white; height: 65px;
            border-radius: 35px; display: flex;
            justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 0 20px;
            z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column;
            align-items: center; font-size: 10px;
            color: var(--text-sub); cursor: pointer;
        }
        .nav-item.active { color: var(--primary-color); }
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; opacity: 0.6; }
        .nav-item.active .nav-icon { opacity: 1; }
        /* Loading animation */
        .loading-content { text-align: center; padding-top: 40%; }
        .cloud-loader {
            width: 80px; height: 50px;
            margin: 0 auto 30px auto;
            background: var(--primary-color);
            border-radius: 50px;
            position: relative;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .cloud-loader::before {
            content: ''; position: absolute;
            width: 40px; height: 40px;
            background: var(--primary-color);
            border-radius: 50%;
            top: -20px; left: 15px;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .loading-content p {
            font-size: 16px; color: var(--text-sub);
        }
        /* Scrollable result */
        .result-box {
            padding-bottom: 20px;
        }
        /* Video Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s; }
        .modal-content {
            width: 90%; max-width: 500px; background: white; border-radius: 20px; padding: 15px; position: relative;
        }
        .close-btn {
            position: absolute; top: -40px; right: 0; background: none; border: none; color: white;
            font-size: 30px; cursor: pointer;
        }
        .iframe-container {
            position: relative; width: 100%; padding-bottom: 56.25%; /* 16:9 ratio */ height: 0; overflow: hidden; border-radius: 10px;
        }
        .iframe-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        /* Responsive PC Additions - Optimized for One-Screen View */
        @media (min-width: 1024px) {
            #app-container { max-width: 1000px; height: 90vh; padding-bottom: 20px; padding-top: 0; }
            #bottom-nav { 
                position: relative; /* Inside container at bottom */
                max-width: 500px; 
                margin: 20px auto 0 auto;
                bottom: 0; left: 0; transform: none;
            }
            .content-box, .question-box, .result-box { 
                padding: 30px 50px; 
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            .intro-image-wrapper {
                width: calc(100% + 100px);
                margin: -30px -50px 20px -50px;
                height: 350px; /* Reduced to fit screen */
            }
            .brand-title { font-size: 16px; }
            .test-title { font-size: 42px; margin-bottom: 15px; }
            .test-desc { font-size: 18px; margin-bottom: 30px; }
            .primary-btn { font-size: 20px; padding: 15px 60px; }
            
            .top-logo-img { height: 40px; }
            .top-logo-text { font-size: 20px; }
            
            #question-text { font-size: 28px; }
            .option-btn { font-size: 18px; padding: 18px 30px; }
            
            #result-type { font-size: 56px; }
            #result-diagnosis { font-size: 18px; line-height: 1.5; margin-bottom: 15px; }
            .result-image-wrapper { height: 320px; margin-bottom: 15px; }
            
            #care-video-section { flex: 0; width: 100%; margin: 10px 0; }
            .action-btns { margin-top: 10px; width: 100%; }
        }
    </style>
</head>

    const optionsContainer = document.getElementById('options-container');
    const progressBar = document.getElementById('progress-bar-fill');
    const questionNumber = document.getElementById('question-number');
    const resultType = document.getElementById('result-type');
    const resultDiagnosis = document.getElementById('result-diagnosis');
    const resultImg = document.getElementById('result-img');
    const careVideoText = document.getElementById('care-video-text');
    const careTitleLabel = document.getElementById('care-title');

    // Start Test
    startBtn.addEventListener('click', () => {
        startScreen.classList.remove('active');
        questionScreen.classList.add('active');
        displayQuestion();
    });

    // Display Question
    function displayQuestion() {
        if (currentQuestion >= questions.length) {
            showLoading();
            return;
        }
        const q = questions[currentQuestion];
        questionNumber.innerText = `Question ${String(currentQuestion + 1).padStart(2, '0')}`;
        questionText.innerText = q.text;
        progressBar.style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
        optionsContainer.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => selectOption(opt.score);
            optionsContainer.appendChild(btn);
        });
    }

    // Handle Option Selection
    function selectOption(score) {
        totalScore += score;
        currentQuestion++;
        displayQuestion();
    }

    // Loading
    function showLoading() {
        questionScreen.classList.remove('active');
        loadingScreen.classList.add('active');
        setTimeout(() => {
            loadingScreen.classList.remove('active');
            showResult();
        }, 2500);
    }

    // Show Result
    function showResult() {
        resultScreen.classList.add('active');
        const result = resultMapping.find(r =>
            totalScore >= r.score_range[0] && totalScore <= r.score_range[1]
        ) || resultMapping[0];

        resultType.innerText = result.type;
        resultType.style.color = result.color;
        resultDiagnosis.innerText = result.diagnosis;
        resultImg.src = result.image_path;
        careTitleLabel.innerText = result.care_title;
        currentCareUrl = result.care_video_url;
        careVideoText.innerText = `클릭하여 ${result.type.split(' ')[0]} 처방 영상 보기`;
    }

    // Care Video Click
    const videoModal = document.getElementById('video-modal');
    const videoIframe = document.getElementById('video-iframe');
    const closeModalBtn = document.getElementById('close-modal-btn');

    document.getElementById('care-video-btn').addEventListener('click', (e) => {
        e.preventDefault();
        if (currentCareUrl) {
            let embedUrl = currentCareUrl;
            if (currentCareUrl.includes('watch?v=')) {
                embedUrl = currentCareUrl.replace('watch?v=', 'embed/');
            } else if (currentCareUrl.includes('shorts/')) {
                embedUrl = currentCareUrl.replace('shorts/', 'embed/');
            }
            videoIframe.src = embedUrl;
            videoModal.classList.add('active');
        } else {
            alert("처방 영상을 준비 중입니다.");
        }
    });

    closeModalBtn.addEventListener('click', () => {
        videoModal.classList.remove('active');
        videoIframe.src = "";
    });

    videoModal.addEventListener('click', (e) => {
        if (e.target === videoModal) {
            videoModal.classList.remove('active');
            videoIframe.src = "";
        }
    });

    // Share Button
    document.getElementById('share-btn').addEventListener('click', () => {
        if (navigator.share) {
            navigator.share({
                title: '마인드웨더 - 내 마음의 기상 특보',
                text: `나의 마음 날씨: ${resultType.innerText}`,
                url: window.location.href
            });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert('링크가 복사되었습니다!');
        }
    });

    // Navigation Active State Handler
    window.setNavActive = function(element) {
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        element.classList.add('active');
        
        const label = element.querySelector('span').innerText;
        if (label === 'Home') {
            location.reload(); // Simple way to go back to landing for now
        } else if (label === 'Present') {
            alert("선물(굿즈) 페이지는 준비 중입니다.");
        } else if (label === 'Video') {
            alert("영상 페이지는 준비 중입니다.");
        } else if (label === 'Care') {
            alert("상담사 연결 페이지는 준비 중입니다.");
        }
    };
    </script>
</body>
</html>
